# =====================================================
# ADHC - Configurações do Backend
# =====================================================
# IMPORTANTE: Nunca coloque valores reais neste arquivo.
# Configure as variáveis de ambiente no Railway (ou onde hospedar).
#
# Variáveis necessárias:
#   ADHC_ADMIN_USER   → nome do usuário admin
#   ADHC_ADMIN_PASS   → senha forte do admin
#   ADHC_JWT_SECRET   → string aleatória de 32+ caracteres
#   ADHC_CORS_ORIGIN  → ex: https://adhc.netlify.app
# =====================================================

adhc.admin.username=${ADHC_ADMIN_USER}
adhc.admin.password=${ADHC_ADMIN_PASS}
adhc.jwt.secret=${ADHC_JWT_SECRET}
adhc.cors.allowed-origin=${ADHC_CORS_ORIGIN}